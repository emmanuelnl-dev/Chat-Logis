<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Logis Peintures</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="chat-window" id="chat-window">
    <div class="chat-header">
      <div class="chat-header__avatar" aria-hidden="true">
        <span class="avatar-online"></span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="7" width="18" height="13" rx="3" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/>
          <circle cx="9" cy="13" r="1.5" fill="rgba(255,255,255,.8)"/>
          <circle cx="15" cy="13" r="1.5" fill="rgba(255,255,255,.8)"/>
          <path d="M9 17h6" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M12 7V4" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="12" cy="3" r="1" fill="rgba(255,255,255,.6)"/>
        </svg>
      </div>
      <div class="chat-header__title">
        Assistant Logis
        <div class="chat-header__sub">Trouvez la peinture qu'il vous faut</div>
      </div>
      <button class="chat-reset-btn" id="chat-reset" aria-label="Recommencer la conversation" title="Recommencer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M1 4v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.5L1 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="chat-close-btn" id="chat-close" aria-label="Fermer le chat">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div id="chat-messages"></div>
  </div>

  <button class="chat-fab" id="chat-fab" aria-label="Ouvrir le chat">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
      <path d="M3 3h20a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H8l-5 4V4a1 1 0 0 1 1-1z" fill="currentColor"/>
    </svg>
    <span class="fab-badge" id="fab-badge" aria-label="1 notification"></span>
  </button>

  <script type="module" src="js/ui.js"></script>
</body>
</html>
